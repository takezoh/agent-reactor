version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    # Core correctness
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    # Code quality
    - gocritic
    - revive
    - misspell
    - unconvert
    - unparam
    - copyloopvar
    # State-machine completeness — flag domain-enum switches that drop cases
    - exhaustive
    # Design principles
    - depguard
    - forbidigo
    # Function length (AGENTS.md: functions ≤ 50 lines)
    - funlen
    # nolint hygiene — flags directives for disabled linters and missing explanations
    - nolintlint

  settings:
    funlen:
      lines: 80
      statements: 99999
      ignore-comments: true

    exhaustive:
      # A switch with a default is treated as exhaustive: selective switches that
      # intentionally handle a few enum values and fall through to default are not
      # flagged. What remains are switches over domain enums that silently drop a
      # case with no default — a state-machine completeness gap.
      default-signifies-exhaustive: true

    nolintlint:
      # Reject //nolint for linters that aren't even enabled (cruft), and require
      # the suppressed linter be named. Explanations are encouraged but not forced
      # (many existing directives are self-evident, e.g. errcheck on os.Remove).
      allow-unused: false
      require-specific: true
      require-explanation: false

    gocritic:
      # Add ruleguard on top of gocritic's default checks. ruleguard runs the
      # custom AST rules in gorules/ that encode pure-functional-core invariants
      # forbidigo cannot express (no goroutines / wall-clock / I/O in the core).
      enabled-checks:
        - ruleguard
      settings:
        ruleguard:
          failOn: all
          rules: "gorules/purecore.go"

    forbidigo:
      # Disable default patterns (^fmt\.Print.*$ etc.) — CLI command files intentionally print
      forbid-default-patterns: false
      patterns:
        - pattern: 'sync\.Mutex'
          pkg: github\.com/takezoh/agent-reactor/client/state
          msg: "state/ is a pure functional core — no mutexes allowed"
        - pattern: 'sync\.RWMutex'
          pkg: github\.com/takezoh/agent-reactor/client/state
          msg: "state/ is a pure functional core — no mutexes allowed"
        - pattern: 'sync\.Mutex'
          pkg: github\.com/takezoh/agent-reactor/orchestrator/scheduler
          msg: "scheduler/ is a pure functional core — no mutexes allowed (concurrency lives in the shell loop)"
        - pattern: 'sync\.RWMutex'
          pkg: github\.com/takezoh/agent-reactor/orchestrator/scheduler
          msg: "scheduler/ is a pure functional core — no mutexes allowed (concurrency lives in the shell loop)"
        - pattern: 'termvt\.NewManager\('
          pkg: github\.com/takezoh/agent-reactor/(server|cmd/server)
          msg: "server/* must reach the daemon via DaemonClient — no direct termvt.NewManager (see ADR 0016)"
        - pattern: 'agentlaunch\.NewDispatcher\('
          pkg: github\.com/takezoh/agent-reactor/(server|cmd/server)
          msg: "server/* must reach the daemon via DaemonClient — no direct agentlaunch.NewDispatcher (see ADR 0016)"
      # The no-goroutine / no-wall-clock / no-direct-I/O invariants of the pure cores
      # are enforced by gocritic's ruleguard checker (gorules/purecore.go); forbidigo
      # matches CallExpr only and cannot see the GoStmt that `go` produces.

    depguard:
      rules:
        platform-no-client-or-orchestrator:
          files:
            - "**/platform/**"
          deny:
            - pkg: github.com/takezoh/agent-reactor/client
              desc: "platform/ must not import client/ (platform is shared base — see plans/02-layout.md)"
            - pkg: github.com/takezoh/agent-reactor/orchestrator
              desc: "platform/ must not import orchestrator/ (platform is shared base — see plans/02-layout.md)"
        client-no-orchestrator:
          files:
            - "**/client/**"
          deny:
            - pkg: github.com/takezoh/agent-reactor/orchestrator
              desc: "client/ must not import orchestrator/ (see plans/02-layout.md)"
        state-pure-core:
          files:
            - "**/client/state/**"
          deny:
            - pkg: github.com/takezoh/agent-reactor/client/driver
              desc: "state/ must not import driver (pure functional core)"
            - pkg: github.com/takezoh/agent-reactor/client/connector
              desc: "state/ must not import connector (pure functional core)"
            - pkg: github.com/takezoh/agent-reactor/platform/lib
              desc: "state/ must not import lib (pure functional core)"
            - pkg: github.com/takezoh/agent-reactor/client/runtime
              desc: "state/ must not import runtime (pure functional core)"
            - pkg: github.com/takezoh/agent-reactor/client/tui
              desc: "state/ must not import tui (pure functional core)"
            - pkg: github.com/takezoh/agent-reactor/client/proto
              desc: "state/ must not import proto (pure functional core)"
        tui-no-driver-connector-lib:
          files:
            - "**/client/tui/**"
          deny:
            - pkg: github.com/takezoh/agent-reactor/client/driver
              desc: "tui/ must not import driver (see ARCHITECTURE.md)"
            - pkg: github.com/takezoh/agent-reactor/client/connector
              desc: "tui/ must not import connector (see ARCHITECTURE.md)"
            - pkg: github.com/takezoh/agent-reactor/platform/lib
              desc: "tui/ must not import lib (see ARCHITECTURE.md)"
        worker-no-driver-connector-lib:
          files:
            - "**/client/runtime/worker/**"
          deny:
            - pkg: github.com/takezoh/agent-reactor/client/driver
              desc: "runtime/worker must not import driver (see ARCHITECTURE.md)"
            - pkg: github.com/takezoh/agent-reactor/client/connector
              desc: "runtime/worker must not import connector (see ARCHITECTURE.md)"
            - pkg: github.com/takezoh/agent-reactor/platform/lib
              desc: "runtime/worker must not import lib (see ARCHITECTURE.md)"
        sandbox-tool-agnostic:
          files:
            - "**/platform/sandbox/**"
          deny:
            - pkg: github.com/takezoh/agent-reactor/client/driver
              desc: "sandbox/ must be tool-agnostic — no driver/ imports (see ARCHITECTURE.md)"
            - pkg: github.com/takezoh/agent-reactor/client/connector
              desc: "sandbox/ must be tool-agnostic — no connector/ imports (see ARCHITECTURE.md)"
            - pkg: github.com/takezoh/agent-reactor/platform/lib
              desc: "sandbox/ must be tool-agnostic — no lib/ imports (see ARCHITECTURE.md)"
            - pkg: github.com/takezoh/agent-reactor/client/runtime
              desc: "sandbox/ must be tool-agnostic — no runtime/ imports (see ARCHITECTURE.md)"
        proto-wire-stdlib-only:
          # The wire/persistence layer must serialize with stdlib only (encoding/json).
          # Bringing a codec library into proto/ breaks the portability constraint
          # (code-enforcement.md §5). Deny the realistic offenders rather than an
          # allow-list, matching the doc's intent: "Do not bring a new codec library
          # (protobuf, etc.) into the wire layer."
          files:
            - "**/client/proto/**"
          deny:
            - pkg: google.golang.org/protobuf
              desc: "wire layer is stdlib-only (encoding/json) — no protobuf (see code-enforcement.md §5)"
            - pkg: github.com/golang/protobuf
              desc: "wire layer is stdlib-only (encoding/json) — no protobuf (see code-enforcement.md §5)"
            - pkg: github.com/vmihailenco/msgpack
              desc: "wire layer is stdlib-only (encoding/json) — no msgpack (see code-enforcement.md §5)"
            - pkg: github.com/fxamacker/cbor
              desc: "wire layer is stdlib-only (encoding/json) — no cbor (see code-enforcement.md §5)"
        proto-isolation:
          files:
            - "**/client/proto/**"
          deny:
            - pkg: github.com/takezoh/agent-reactor/client/driver
              desc: "proto/ must not import driver (see ARCHITECTURE.md)"
            - pkg: github.com/takezoh/agent-reactor/client/connector
              desc: "proto/ must not import connector (see ARCHITECTURE.md)"
            - pkg: github.com/takezoh/agent-reactor/platform/lib
              desc: "proto/ must not import lib (see ARCHITECTURE.md)"
            - pkg: github.com/takezoh/agent-reactor/client/runtime
              desc: "proto/ must not import runtime (see ARCHITECTURE.md)"
            - pkg: github.com/takezoh/agent-reactor/client/tui
              desc: "proto/ must not import tui (see ARCHITECTURE.md)"
        runtime-no-driver:
          # runtime/ root must not import driver/ (tool-specific) — subsystem-specific code lives in runtime/subsystem/<kind>/
          # Exceptions handled in exclusions.rules: driver/vt (VT emulator) is generic; test files are exempt.
          files:
            - "**/client/runtime/*.go"
            - "!**/*_test.go"
          deny:
            - pkg: github.com/takezoh/agent-reactor/client/driver
              desc: "runtime/ root must not import driver/. Move tool-specific backend code to runtime/subsystem/<kind>/ (see ARCHITECTURE.md Driver/Connector/Subsystem isolation)"
        subsystem-isolation:
          files:
            - "**/client/runtime/subsystem/**"
          deny:
            - pkg: github.com/takezoh/agent-reactor/client/tui
              desc: "runtime/subsystem/ must not import tui (see ARCHITECTURE.md)"
            - pkg: github.com/takezoh/agent-reactor/client/connector
              desc: "runtime/subsystem/ must not import connector (see ARCHITECTURE.md)"
        codexclient-isolation:
          # codexclient is a reusable platform transport — it must not reach into
          # client/ or orchestrator/.  codexschema and logger are the only
          # agent-reactor packages it may import.
          files:
            - "**/platform/agent/codexclient/**"
          deny:
            - pkg: github.com/takezoh/agent-reactor/client
              desc: "codexclient/ must not import client/ (reusable platform layer — see plans/02-layout.md)"
            - pkg: github.com/takezoh/agent-reactor/orchestrator
              desc: "codexclient/ must not import orchestrator/ (reusable platform layer — see plans/02-layout.md)"
        server-no-orchestrator-or-direct-termvt:
          # server/* is the HTTP/WS gateway layer — it communicates with the daemon
          # via DaemonClient (Unix-socket RPC) and must not bypass that boundary.
          # Allowed: client/proto, client/state, client/runtime, platform/* (deny-list style).
          # See ADR 0016.
          files:
            - "**/server/**"
            - "**/cmd/server/**"
          deny:
            - pkg: github.com/takezoh/agent-reactor/orchestrator
              desc: "server/* must not import orchestrator/* (HTTP/WS gateway layer — see ADR 0016)"

    revive:
      rules:
        - name: exported
          disabled: true
        - name: unexported-return
          disabled: true
        - name: unused-parameter
          disabled: true
        # File length ≤ 500 lines (AGENTS.md / code-enforcement.md §3)
        - name: file-length-limit
          arguments:
            - max: 500
              skipComments: true
              skipBlankLines: true

  exclusions:
    rules:
      # Test files: funlen and errcheck are relaxed in tests
      - linters: [funlen]
        path: "_test\\.go$"
      # state-machine reducer dispatch tables are exempt from the function-length limit.
      # Forced extraction of dispatch arms produces single-use helpers that fragment the
      # state machine without adding clarity.
      - linters: [funlen]
        path: "client/state/reduce_.*\\.go$"
      - linters: [errcheck]
        path: "_test\\.go$"
      # Deferred close is idiomatic — errors are unrecoverable at that point
      - linters: [errcheck]
        text: "Error return value of `.*\\.Close` is not checked"
      # fmt.Fprintf/Fprintln to os.Stderr/Stdout — write errors are irrelevant for CLI output
      - linters: [errcheck]
        text: "Error return value of `fmt\\.Fp" # covers Fprintf, Fprintln
      # hugeParam false positives on value-type receiver structs (by design)
      - linters: [gocritic]
        text: "hugeParam:"
      # CLI command handlers in platform/lib/*/command.go intentionally print to stdout
      - linters: [forbidigo]
        path: "platform/lib/.+/command\\.go$"
      # client/driver/vt is a generic VT terminal emulator sub-package, not a tool-specific driver
      - linters: [depguard]
        text: "client/driver/vt.*is not allowed from list 'runtime-no-driver'"
      # nolintlint is a production-code hygiene gate. In tests, errcheck is already
      # relaxed by path (above), so per-line //nolint:errcheck directives there are
      # redundant by construction — don't make nolintlint flag them.
      - linters: [nolintlint]
        path: "_test\\.go$"
      # File-length limit targets production maintainability; tests relax it like
      # funlen does (table-driven tests grow large by nature). Only file-length-limit
      # is relaxed here — revive's other rules still apply to tests.
      - linters: [revive]
        path: "_test\\.go$"
        text: "file-length-limit"
formatters:
  enable:
    - gofmt
    - goimports
