name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum

      - name: vet
        run: go vet ./...

      - name: test
        run: go test ./...

      - name: build
        run: go build -o ../roost .

      - name: lint
        run: go tool golangci-lint run ./...
