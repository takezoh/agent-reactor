              - link "Engineering" [ref=e74] [cursor=pointer]:
                - /url: /news/engineering/
            - 'heading "Harness engineering: leveraging Codex in an agent-first world" [level=1] [ref=e75]'
            - paragraph [ref=e77]: By Ryan Lopopolo, Member of the Technical Staff
          - generic [ref=e79]:
            - generic [ref=e82]:
