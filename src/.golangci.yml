version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    # Core correctness
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    # Code quality
    - gocritic
    - revive
    - misspell
    - unconvert
    - unparam
    - copyloopvar
    # Design principles
    - depguard
    - forbidigo
    # Function length (AGENTS.md: functions ≤ 50 lines)
    - funlen

  settings:
    funlen:
      lines: 80
      statements: 99999
      ignore-comments: true

    forbidigo:
      # Disable default patterns (^fmt\.Print.*$ etc.) — CLI command files intentionally print
      forbid-default-patterns: false
      patterns:
        - pattern: 'sync\.Mutex'
          pkg: github\.com/takezoh/agent-roost/client/state
          msg: "state/ is a pure functional core — no mutexes allowed"
        - pattern: 'sync\.RWMutex'
          pkg: github\.com/takezoh/agent-roost/client/state
          msg: "state/ is a pure functional core — no mutexes allowed"
      # NOTE: "go" keyword (goroutines) cannot be detected by forbidigo because it matches
      # CallExpr nodes only; GoStmt is invisible to it. The "no goroutines in state/" rule
      # is enforced by code review. A custom staticcheck analyzer would be needed to automate it.

    depguard:
      rules:
        platform-no-client-or-orchestrator:
          files:
            - "**/platform/**"
          deny:
            - pkg: github.com/takezoh/agent-roost/client
              desc: "platform/ must not import client/ (platform is shared base — see plans/02-layout.md)"
            - pkg: github.com/takezoh/agent-roost/orchestrator
              desc: "platform/ must not import orchestrator/ (platform is shared base — see plans/02-layout.md)"
        client-no-orchestrator:
          files:
            - "**/client/**"
          deny:
            - pkg: github.com/takezoh/agent-roost/orchestrator
              desc: "client/ must not import orchestrator/ (see plans/02-layout.md)"
        state-pure-core:
          files:
            - "**/client/state/**"
          deny:
            - pkg: github.com/takezoh/agent-roost/client/driver
              desc: "state/ must not import driver (pure functional core)"
            - pkg: github.com/takezoh/agent-roost/client/connector
              desc: "state/ must not import connector (pure functional core)"
            - pkg: github.com/takezoh/agent-roost/platform/lib
              desc: "state/ must not import lib (pure functional core)"
            - pkg: github.com/takezoh/agent-roost/client/runtime
              desc: "state/ must not import runtime (pure functional core)"
            - pkg: github.com/takezoh/agent-roost/client/tui
              desc: "state/ must not import tui (pure functional core)"
            - pkg: github.com/takezoh/agent-roost/client/proto
              desc: "state/ must not import proto (pure functional core)"
        tui-no-driver-connector-lib:
          files:
            - "**/client/tui/**"
          deny:
            - pkg: github.com/takezoh/agent-roost/client/driver
              desc: "tui/ must not import driver (see ARCHITECTURE.md)"
            - pkg: github.com/takezoh/agent-roost/client/connector
              desc: "tui/ must not import connector (see ARCHITECTURE.md)"
            - pkg: github.com/takezoh/agent-roost/platform/lib
              desc: "tui/ must not import lib (see ARCHITECTURE.md)"
        worker-no-driver-connector-lib:
          files:
            - "**/client/runtime/worker/**"
          deny:
            - pkg: github.com/takezoh/agent-roost/client/driver
              desc: "runtime/worker must not import driver (see ARCHITECTURE.md)"
            - pkg: github.com/takezoh/agent-roost/client/connector
              desc: "runtime/worker must not import connector (see ARCHITECTURE.md)"
            - pkg: github.com/takezoh/agent-roost/platform/lib
              desc: "runtime/worker must not import lib (see ARCHITECTURE.md)"
        sandbox-tool-agnostic:
          files:
            - "**/platform/sandbox/**"
          deny:
            - pkg: github.com/takezoh/agent-roost/client/driver
              desc: "sandbox/ must be tool-agnostic — no driver/ imports (see ARCHITECTURE.md)"
            - pkg: github.com/takezoh/agent-roost/client/connector
              desc: "sandbox/ must be tool-agnostic — no connector/ imports (see ARCHITECTURE.md)"
            - pkg: github.com/takezoh/agent-roost/platform/lib
              desc: "sandbox/ must be tool-agnostic — no lib/ imports (see ARCHITECTURE.md)"
            - pkg: github.com/takezoh/agent-roost/client/runtime
              desc: "sandbox/ must be tool-agnostic — no runtime/ imports (see ARCHITECTURE.md)"
        proto-isolation:
          files:
            - "**/client/proto/**"
          deny:
            - pkg: github.com/takezoh/agent-roost/client/driver
              desc: "proto/ must not import driver (see ARCHITECTURE.md)"
            - pkg: github.com/takezoh/agent-roost/client/connector
              desc: "proto/ must not import connector (see ARCHITECTURE.md)"
            - pkg: github.com/takezoh/agent-roost/platform/lib
              desc: "proto/ must not import lib (see ARCHITECTURE.md)"
            - pkg: github.com/takezoh/agent-roost/client/runtime
              desc: "proto/ must not import runtime (see ARCHITECTURE.md)"
            - pkg: github.com/takezoh/agent-roost/client/tui
              desc: "proto/ must not import tui (see ARCHITECTURE.md)"
        runtime-no-driver:
          # runtime/ root must not import driver/ (tool-specific) — subsystem-specific code lives in runtime/subsystem/<kind>/
          # Exceptions handled in exclusions.rules: driver/vt (VT emulator) is generic; test files are exempt.
          files:
            - "**/client/runtime/*.go"
            - "!**/*_test.go"
          deny:
            - pkg: github.com/takezoh/agent-roost/client/driver
              desc: "runtime/ root must not import driver/. Move tool-specific backend code to runtime/subsystem/<kind>/ (see ARCHITECTURE.md Driver/Connector/Subsystem isolation)"
        subsystem-isolation:
          files:
            - "**/client/runtime/subsystem/**"
          deny:
            - pkg: github.com/takezoh/agent-roost/client/tui
              desc: "runtime/subsystem/ must not import tui (see ARCHITECTURE.md)"
            - pkg: github.com/takezoh/agent-roost/client/connector
              desc: "runtime/subsystem/ must not import connector (see ARCHITECTURE.md)"

    revive:
      rules:
        - name: exported
          disabled: true
        - name: unexported-return
          disabled: true
        - name: unused-parameter
          disabled: true

  exclusions:
    rules:
      # Test files: funlen and errcheck are relaxed in tests
      - linters: [funlen]
        path: "_test\\.go$"
      # state-machine reducer dispatch tables are exempt from the function-length limit.
      # Forced extraction of dispatch arms produces single-use helpers that fragment the
      # state machine without adding clarity.
      - linters: [funlen]
        path: "client/state/reduce_.*\\.go$"
      - linters: [errcheck]
        path: "_test\\.go$"
      # Deferred close is idiomatic — errors are unrecoverable at that point
      - linters: [errcheck]
        text: "Error return value of `.*\\.Close` is not checked"
      # fmt.Fprintf/Fprintln to os.Stderr/Stdout — write errors are irrelevant for CLI output
      - linters: [errcheck]
        text: "Error return value of `fmt\\.Fp" # covers Fprintf, Fprintln
      # hugeParam false positives on value-type receiver structs (by design)
      - linters: [gocritic]
        text: "hugeParam:"
      # CLI command handlers in platform/lib/*/command.go intentionally print to stdout
      - linters: [forbidigo]
        path: "platform/lib/.+/command\\.go$"
      # client/driver/vt is a generic VT terminal emulator sub-package, not a tool-specific driver
      - linters: [depguard]
        text: "client/driver/vt.*is not allowed from list 'runtime-no-driver'"
formatters:
  enable:
    - gofmt
    - goimports
