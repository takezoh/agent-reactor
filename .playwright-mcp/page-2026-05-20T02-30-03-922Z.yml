        - generic [ref=e95]:
          - paragraph [ref=e97]:
            - text: "Over the past five months, our team has been running an experiment: building and shipping an internal beta of a software product with"
            - generic [ref=e98]: 0 lines of manually-written code
            - text: .
          - paragraph [ref=e100]: The product has internal daily users and external alpha testers. It ships, deploys, breaks, and gets fixed. What’s different is that every line of code—application logic, tests, CI configuration, documentation, observability, and internal tooling—has been written by Codex. We estimate that we built this in about 1/10th the time it would have taken to write the code by hand.
          - paragraph [ref=e102]:
            - generic [ref=e103]: Humans steer. Agents execute.
          - paragraph [ref=e105]: We intentionally chose this constraint so we would build what was necessary to increase engineering velocity by orders of magnitude. We had weeks to ship what ended up being a million lines of code. To do that, we needed to understand what changes when a software engineering team’s primary job is no longer to write code, but to design environments, specify intent, and build feedback loops that allow Codex agents to do reliable work.
          - paragraph [ref=e107]: "This post is about what we learned by building a brand new product with a team of agents—what broke, what compounded, and how to maximize our one truly scarce resource: human time and attention."
          - heading "We started with an empty git repository" [level=2] [ref=e111]
          - paragraph [ref=e113]: The first commit to an empty repository landed in late August 2025.
          - paragraph [ref=e115]: The initial scaffold—repository structure, CI configuration, formatting rules, package manager setup, and application framework—was generated by Codex CLI using GPT‑5, guided by a small set of existing templates. Even the initial AGENTS.md file that directs agents how to work in the repository was itself written by Codex.
          - paragraph [ref=e117]: There was no pre-existing human-written code to anchor the system. From the beginning, the repository was shaped by the agent.
          - paragraph [ref=e119]:
            - text: Five months later, the repository contains on the order of a million lines of code across application logic, infrastructure, tooling, documentation, and internal developer utilities. Over that period, roughly 1,500 pull requests have been opened and merged with a small team of just three engineers driving Codex. This translates to an average throughput of 3.5 PRs per engineer per day, and surprisingly the throughput has
            - generic [ref=e120]: increased
            - text: "as the team has grown to now seven engineers. Importantly, this wasn’t output for output’s sake: the product has been used by hundreds of users internally, including daily internal power users."
          - paragraph [ref=e122]:
            - text: "Throughout the development process, humans never directly contributed any code. This became a core philosophy for the team:"
            - generic [ref=e123]: no manually-written code
            - text: .
          - heading "Redefining the role of the engineer" [level=2] [ref=e127]
          - paragraph [ref=e129]:
            - text: The lack of hands-on human coding
            - generic [ref=e130]: introduced a different kind of engineering work, focused on systems, scaffolding, and leverage
            - text: .
          - paragraph [ref=e132]: Early progress was slower than we expected, not because Codex was incapable, but because the environment was underspecified. The agent lacked the tools, abstractions, and internal structure required to make progress toward high-level goals. The primary job of our engineering team became enabling the agents to do useful work.
          - paragraph [ref=e134]: "In practice, this meant working depth-first: breaking down larger goals into smaller building blocks (design, code, review, test, etc), prompting the agent to construct those blocks, and using them to unlock more complex tasks. When something failed, the fix was almost never “try harder.” Because the only way to make progress was to get Codex to do the work, human engineers always stepped into the task and asked: “what capability is missing, and how do we make it both legible and enforceable for the agent?”"
          - paragraph [ref=e136]:
            - text: "Humans interact with the system almost entirely through prompts: an engineer describes a task, runs the agent, and allows it to open a pull request. To drive a PR to completion, we instruct Codex to review its own changes locally, request additional specific agent reviews both locally and in the cloud, respond to any human or agent given feedback, and iterate in a loop until all agent reviewers are satisfied (effectively this is a"
            - link "Ralph Wiggum Loop⁠ (opens in a new window)" [ref=e137] [cursor=pointer]:
              - /url: https://ghuntley.com/loop/
              - generic [ref=e138]: Ralph Wiggum Loop
              - text: ⁠
              - generic [ref=e139]: (opens in a new window)
            - text: ). Codex uses our standard development tools directly (gh, local scripts, and repository-embedded skills) to gather context without humans copying and pasting into the CLI.
          - paragraph [ref=e141]: Humans may review pull requests, but aren’t required to. Over time, we’ve pushed almost all review effort towards being handled agent-to-agent.
          - heading "Increasing application legibility" [level=2] [ref=e145]
          - paragraph [ref=e147]: As code throughput increased, our bottleneck became human QA capacity. Because the fixed constraint has been human time and attention, we’ve worked to add more capabilities to the agent by making things like the application UI, logs, and app metrics themselves directly legible to Codex.
          - paragraph [ref=e149]: For example, we made the app bootable per git worktree, so Codex could launch and drive one instance per change. We also wired the Chrome DevTools Protocol into the agent runtime and created skills for working with DOM snapshots, screenshots, and navigation. This enabled Codex to reproduce bugs, validate fixes, and reason about UI behavior directly.
          - figure [ref=e151]:
            - img "Diagram titled “Codex drives the app with Chrome DevTools MCP to validate its work.” Codex selects a target, snapshots the state before and after triggering a UI path, observes runtime events via Chrome DevTools, applies fixes, restarts, and loops re-running validation until the app is clean." [ref=e159]
          - paragraph [ref=e161]: We did the same for observability tooling. Logs, metrics, and traces are exposed to Codex via a local observability stack that’s ephemeral for any given worktree. Codex works on a fully isolated version of that app—including its logs and metrics, which get torn down once that task is complete. Agents can query logs with LogQL and metrics with PromQL. With this context available, prompts like “ensure service startup completes in under 800ms” or “no span in these four critical user journeys exceeds two seconds” become tractable.
          - figure [ref=e163]:
            - img "Diagram titled “Giving Codex a full observability stack in local dev.” An app sends logs, metrics, and traces to Vector, which fans out data to an observability stack containing Victoria Logs, Metrics, and Traces, each queried via LogQL, PromQL, or TraceQL APIs. Codex uses these signals to query, correlate, and reason, then implements fixes in the codebase, restarts the app, re-runs workloads, tests UI journeys, and repeats in a feedback loop." [ref=e171]
          - paragraph [ref=e173]: We regularly see single Codex runs work on a single task for upwards of six hours (often while the humans are sleeping).
          - heading "We made repository knowledge the system of record" [level=2] [ref=e177]
          - paragraph [ref=e179]:
            - text: "Context management is one of the biggest challenges in making agents effective at large and complex tasks. One of the earliest lessons we learned was simple:"
            - generic [ref=e180]: give Codex a map, not a 1,000-page instruction manual.
          - paragraph [ref=e182]:
            - text: We tried the “one big
            - link "AGENTS.md⁠ (opens in a new window)" [ref=e183] [cursor=pointer]:
              - /url: https://agents.md/
              - code [ref=e185]: AGENTS.md
              - text: ⁠
              - generic [ref=e186]: (opens in a new window)
            - text: "” approach. It failed in predictable ways:"
          - list [ref=e188]:
            - listitem [ref=e189]:
              - generic [ref=e190]: Context is a scarce resource.
              - text: A giant instruction file crowds out the task, the code, and the relevant docs—so the agent either misses key constraints or starts optimizing for the wrong ones.
            - listitem [ref=e191]:
              - generic [ref=e192]: Too much guidance becomes
              - generic [ref=e194]: non-guidance
              - generic [ref=e195]: .
              - text: When everything is “important,” nothing is. Agents end up pattern-matching locally instead of navigating intentionally.
            - listitem [ref=e196]:
              - generic [ref=e197]: It rots instantly.
              - text: A monolithic manual turns into a graveyard of stale rules. Agents can’t tell what’s still true, humans stop maintaining it, and the file quietly becomes an attractive nuisance.
            - listitem [ref=e198]:
              - generic [ref=e199]: It’s hard to verify.
              - text: A single blob doesn’t lend itself to mechanical checks (coverage, freshness, ownership, cross-links), so drift is inevitable.
          - paragraph [ref=e201]:
            - text: So instead of treating
            - code [ref=e203]: AGENTS.md
            - text: as the encyclopedia, we treat it as
