name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum

      - name: vet
        run: go vet ./...

      - name: vet (e2e build tag)
        run: go vet -tags e2e ./client/runtime/subsystem/stream/...

      - name: test
        run: go test ./...

      - name: coverage
        working-directory: .
        run: scripts/check-coverage.sh

      - name: build
        run: go build -o ../arc ./cmd/arc

      - name: build orchestrator + claude-app-server
        run: |
          go build -o ../orchestrator ./cmd/orchestrator
          go build -o ../claude-app-server ./cmd/claude-app-server

      - name: lint
        run: go tool golangci-lint run ./...

  # The race detector guards the single-writer event loop: it catches
  # unsynchronized concurrent access to loop-owned state introduced by a stray
  # goroutine in the imperative shell. Run as a separate job because -race makes
  # tests several times slower; it is off the main ci job's critical path.
  race:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum

      - name: test -race
        run: go test -race ./...

  # Active fuzzing of the routing-isolation invariant. A separate job (like
  # race) so its non-deterministic, time-boxed exploration stays off the main
  # ci job's critical path. The seed corpus already runs in ci's `test` step.
  fuzz:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum

      - name: fuzz routing isolation
        run: go test -run '^$' -fuzz '^FuzzStreamRouting$' -fuzztime=30s ./client/runtime/subsystem/stream/

  schema-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install codex 0.133.0
        run: npm install -g @openai/codex@0.133.0

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Check schema drift
        working-directory: .
        run: make codex-schema-check
