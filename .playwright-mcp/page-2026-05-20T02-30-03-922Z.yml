            - paragraph [ref=e310]: In-repository knowledge store layout.
          - paragraph [ref=e312]:
            - text: Design documentation is catalogued and indexed, including verification status and a set of core beliefs that define agent-first operating principles.
            - link "Architecture documentation⁠ (opens in a new window)" [ref=e313] [cursor=pointer]:
              - /url: https://matklad.github.io/2021/02/06/ARCHITECTURE.md.html
              - generic [ref=e314]: Architecture documentation
              - text: ⁠
              - generic [ref=e315]: (opens in a new window)
            - text: provides a top-level map of domains and package layering. A quality document grades each product domain and architectural layer, tracking gaps over time.
          - paragraph [ref=e317]:
            - text: Plans are treated as first-class artifacts. Ephemeral lightweight plans are used for small changes, while complex work is captured in
            - link "execution plans⁠ (opens in a new window)" [ref=e318] [cursor=pointer]:
              - /url: https://cookbook.openai.com/articles/codex_exec_plans
              - generic [ref=e319]: execution plans
              - text: ⁠
              - generic [ref=e320]: (opens in a new window)
            - text: with progress and decision logs that are checked into the repository. Active plans, completed plans, and known technical debt are all versioned and co-located, allowing agents to operate without relying on external context.
          - paragraph [ref=e322]:
            - text: This enables
            - generic [ref=e323]: progressive disclosure
            - text: ": agents start with a small, stable entry point and are taught where to look next, rather than being overwhelmed up front."
          - paragraph [ref=e325]: We enforce this mechanically. Dedicated linters and CI jobs validate that the knowledge base is up to date, cross-linked, and structured correctly. A recurring “doc-gardening” agent scans for stale or obsolete documentation that does not reflect the real code behavior and opens fix-up pull requests.
          - heading "Agent legibility is the goal" [level=2] [ref=e329]
          - paragraph [ref=e331]: As the codebase evolved, Codex’s framework for design decisions needed to evolve, too.
          - paragraph [ref=e333]:
            - text: Because the repository is entirely agent-generated, it’s optimized first for
            - generic [ref=e334]: Codex’s
            - generic [ref=e335]: legibility
            - text: . In the same way teams aim to improve navigability of their code for new engineering hires, our human engineers’ goal was making it possible for an agent to reason about the full business domain
            - generic [ref=e336]: directly from the repository itself.
          - paragraph [ref=e338]: From the agent’s point of view, anything it can’t access in-context while running effectively doesn’t exist. Knowledge that lives in Google Docs, chat threads, or people’s heads are not accessible to the system. Repository-local, versioned artifacts (e.g., code, markdown, schemas, executable plans) are all it can see.
          - figure [ref=e340]:
            - 'img "Diagram titled “The limits of agent knowledge: What Codex can’t see doesn’t exist.” Codex’s knowledge is shown as a bounded bubble. Below it are examples of unseen knowledge—Google Docs, Slack messages, and tacit human knowledge. Arrows indicate that to make this information visible to Codex, it must be encoded into the codebase as markdown." [ref=e348]'
          - paragraph [ref=e350]: We learned that we needed to push more and more context into the repo over time. That Slack discussion that aligned the team on an architectural pattern? If it isn’t discoverable to the agent, it’s illegible in the same way it would be unknown to a new hire joining three months later.
          - paragraph [ref=e352]: Giving Codex more context means organizing and exposing the right information so the agent can reason over it, rather than overwhelming it with ad-hoc instructions. In the same way you would onboard a new teammate on product principles, engineering norms, and team culture (emoji preferences included), giving the agent this information leads to better-aligned output.
          - paragraph [ref=e354]:
            - text: This framing clarified many tradeoffs. We favored dependencies and abstractions that could be fully internalized and reasoned about in-repo. Technologies often described as “boring” tend to be easier for agents to model due to composability, api stability, and representation in the training set. In some cases, it was cheaper to have the agent reimplement subsets of functionality than to work around opaque upstream behavior from public libraries. For example, rather than pulling in a generic
            - code [ref=e356]: p-limit
            - text: "-style package, we implemented our own map-with-concurrency helper: it’s tightly integrated with our OpenTelemetry instrumentation, has 100% test coverage, and behaves exactly the way our runtime expects."
          - paragraph [ref=e358]:
            - text: Pulling more of the system into a form the agent can inspect, validate, and modify directly increases leverage—not just for Codex, but for other agents (e.g.
            - link "Aardvark" [ref=e359] [cursor=pointer]:
              - /url: /index/introducing-aardvark/
              - generic [ref=e360]: Aardvark
            - text: ) that are working on the codebase as well.
          - heading "Enforcing architecture and taste" [level=2] [ref=e364]
          - paragraph [ref=e366]:
            - text: Documentation alone doesn’t keep a fully agent-generated codebase coherent.
            - generic [ref=e367]: By enforcing invariants, not micromanaging implementations, we let agents ship fast without undermining the foundation.
            - text: For example, we require Codex to
            - link "parse data shapes at the boundary⁠ (opens in a new window)" [ref=e368] [cursor=pointer]:
              - /url: https://lexi-lambda.github.io/blog/2019/11/05/parse-don-t-validate/
              - generic [ref=e369]: parse data shapes at the boundary
              - text: ⁠
              - generic [ref=e370]: (opens in a new window)
            - text: ", but are not prescriptive on how that happens (the model seems to like Zod, but we didn’t specify that specific library)."
          - paragraph [ref=e372]:
            - text: Agents are most effective in environments with
            - link "strict boundaries and predictable structure⁠ (opens in a new window)" [ref=e373] [cursor=pointer]:
              - /url: https://bits.logic.inc/p/ai-is-forcing-us-to-write-good-code
              - generic [ref=e374]: strict boundaries and predictable structure
              - text: ⁠
              - generic [ref=e375]: (opens in a new window)
            - text: ", so we built the application around a rigid architectural model. Each business domain is divided into a fixed set of layers, with strictly validated dependency directions and a limited set of permissible edges. These constraints are enforced mechanically via custom linters (Codex-generated, of course!) and structural tests."
          - paragraph [ref=e377]: "The diagram below shows the rule: within each business domain (e.g. App Settings), code can only depend “forward” through a fixed set of layers (Types → Config → Repo → Service → Runtime → UI). Cross-cutting concerns (auth, connectors, telemetry, feature flags) enter through a single explicit interface: Providers. Anything else is disallowed and enforced mechanically."
          - figure [ref=e379]:
            - 'img "Diagram titled “Layered domain architecture with explicit cross-cutting boundaries.” Inside the business logic domain are modules: Types → Config → Repo, and Providers → Service → Runtime → UI, with App Wiring + UI at the bottom. A Utils module sits outside the boundary and feeds into Providers." [ref=e387]'
          - paragraph [ref=e389]: "This is the kind of architecture you usually postpone until you have hundreds of engineers. With coding agents, it’s an early prerequisite: the constraints are what allows speed without decay or architectural drift."
          - paragraph [ref=e391]: In practice, we enforce these rules with custom linters and structural tests, plus a small set of “taste invariants.” For example, we statically enforce structured logging, naming conventions for schemas and types, file size limits, and platform-specific reliability requirements with custom lints. Because the lints are custom, we write the error messages to inject remediation instructions into agent context.
          - paragraph [ref=e393]: "In a human-first workflow, these rules might feel pedantic or constraining. With agents, they become multipliers: once encoded, they apply everywhere at once."
          - paragraph [ref=e395]: "At the same time, we’re explicit about where constraints matter and where they do not. This resembles leading a large engineering platform organization: enforce boundaries centrally, allow autonomy locally. You care deeply about boundaries, correctness, and reproducibility. Within those boundaries, you allow teams—or agents—significant freedom in how solutions are expressed."
          - paragraph [ref=e397]: The resulting code does not always match human stylistic preferences, and that’s okay. As long as the output is correct, maintainable, and legible to future agent runs, it meets the bar.
          - paragraph [ref=e399]: Human taste is fed back into the system continuously. Review comments, refactoring pull requests, and user-facing bugs are captured as documentation updates or encoded directly into tooling. When documentation falls short, we promote the rule into code
          - heading "Throughput changes the merge philosophy" [level=2] [ref=e403]
          - paragraph [ref=e405]: As Codex’s throughput increased, many conventional engineering norms became counterproductive.
          - paragraph [ref=e407]: The repository operates with minimal blocking merge gates. Pull requests are short-lived. Test flakes are often addressed with follow-up runs rather than blocking progress indefinitely. In a system where agent throughput far exceeds human attention, corrections are cheap, and waiting is expensive.
          - paragraph [ref=e409]: This would be irresponsible in a low-throughput environment. Here, it’s often the right tradeoff.
          - heading "What “agent-generated” actually means" [level=2] [ref=e413]
          - paragraph [ref=e415]: When we say the codebase is generated by Codex agents, we mean everything in the codebase.
          - paragraph [ref=e417]: "Agents produce:"
          - list [ref=e419]:
            - listitem [ref=e420]: Product code and tests
            - listitem [ref=e421]: CI configuration and release tooling
            - listitem [ref=e422]: Internal developer tools
            - listitem [ref=e423]: Documentation and design history
            - listitem [ref=e424]: Evaluation harnesses
            - listitem [ref=e425]: Review comments and responses
            - listitem [ref=e426]: Scripts that manage the repository itself
            - listitem [ref=e427]: Production dashboard definition files
          - paragraph [ref=e429]: "Humans always remain in the loop, but work at a different layer of abstraction than we used to. We prioritize work, translate user feedback into acceptance criteria, and validate outcomes. When the agent struggles, we treat it as a signal: identify what is missing—tools, guardrails, documentation—and feed it back into the repository, always by having Codex itself write the fix."
          - paragraph [ref=e431]: Agents use our standard development tools directly. They pull review feedback, respond inline, push updates, and often squash and merge their own pull requests.
          - heading "Increasing levels of autonomy" [level=2] [ref=e435]
          - paragraph [ref=e437]: As more of the development loop was encoded directly into the system—testing, validation, review, feedback handling, and recovery—the repository recently crossed a meaningful threshold where Codex can end-to-end drive a new feature.
          - paragraph [ref=e439]: "Given a single prompt, the agent can now:"
          - list [ref=e441]:
            - listitem [ref=e442]: Validate the current state of the codebase
            - listitem [ref=e443]: Reproduce a reported bug
            - listitem [ref=e444]: Record a video demonstrating the failure
            - listitem [ref=e445]: Implement a fix
            - listitem [ref=e446]: Validate the fix by driving the application
            - listitem [ref=e447]: Record a second video demonstrating the resolution
            - listitem [ref=e448]: Open a pull request
            - listitem [ref=e449]: Respond to agent and human feedback
            - listitem [ref=e450]: Detect and remediate build failures
            - listitem [ref=e451]: Escalate to a human only when judgment is required
            - listitem [ref=e452]: Merge the change
          - paragraph [ref=e454]: This behavior depends heavily on the specific structure and tooling of this repository and should not be assumed to generalize without similar investment—at least, not yet.
          - heading "Entropy and garbage collection" [level=2] [ref=e458]
          - paragraph [ref=e460]:
            - generic [ref=e461]: Full agent autonomy also introduces novel problems.
            - text: Codex replicates patterns that already exist in the repository—even uneven or suboptimal ones. Over time, this inevitably leads to drift.
          - paragraph [ref=e463]: Initially, humans addressed this manually. Our team used to spend every Friday (20% of the week) cleaning up “AI slop.” Unsurprisingly, that didn’t scale.
          - paragraph [ref=e465]: "Instead, we started encoding what we call “golden principles” directly into the repository and built a recurring cleanup process. These principles are opinionated, mechanical rules that keep the codebase legible and consistent for future agent runs. For example: (1) we prefer shared utility packages over hand-rolled helpers to keep invariants centralized, and (2) we don’t probe data “YOLO-style”—we validate boundaries or rely on typed SDKs so the agent can’t accidentally build on guessed shapes. On a regular cadence, we have a set of background Codex tasks that scan for deviations, update quality grades, and open targeted refactoring pull requests. Most of these can be reviewed in under a minute and automerged."
          - paragraph [ref=e467]: "This functions like garbage collection. Technical debt is like a high-interest loan: it’s almost always better to pay it down continuously in small increments than to let it compound and tackle it in painful bursts. Human taste is captured once, then enforced continuously on every line of code. This also lets us catch and resolve bad patterns on a daily basis, rather than letting them spread in the code base for days or weeks."
          - heading "What we’re still learning" [level=2] [ref=e471]
          - paragraph [ref=e473]: This strategy has so far worked well up through internal launch and adoption at OpenAI. Building a real product for real users helped anchor our investments in reality and guide us towards long-term maintainability.
          - paragraph [ref=e475]: What we don’t yet know is how architectural coherence evolves over years in a fully agent-generated system. We’re still learning where human judgment adds the most leverage and how to encode that judgment so it compounds. We also don’t know how this system will evolve as models continue to become more capable over time.
          - paragraph [ref=e477]: "What’s become clear: building software still demands discipline, but the discipline shows up more in the scaffolding rather than the code. The tooling, abstractions, and feedback loops that keep the codebase coherent are increasingly important."
          - paragraph [ref=e479]:
            - generic [ref=e480]: Our most difficult challenges now center on designing environments, feedback loops, and control systems
            - text: "that help agents accomplish our goal: build and maintain complex, reliable software at scale."
          - paragraph [ref=e482]:
            - text: As agents like Codex take on larger portions of the software lifecycle, these questions will matter even more. We hope that sharing some early lessons helps you reason about where to invest your effort so
            - link "you can just build things" [ref=e483] [cursor=pointer]:
              - /url: /codex/
              - generic [ref=e484]: you can just build things
            - text: .
